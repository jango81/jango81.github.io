<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Korttipakka</title>
</head>
<body>
    <div class="wrapper">
        <div class="card_block">
            <div class="card_item">
                <div class="card_image">
                    <img src="images/cards/1.jpg" alt="card">
                </div>
            </div>
            <div class="card_item">
                <div class="card_image">
                    <img src="images/cards/2.jpg" alt="card">
                </div>
            </div>
            <div class="card_item">
                <div class="card_image">
                    <img src="images/cards/3.jpg" alt="card">
                </div>
            </div>
            <div class="card_item">
                <div class="card_image">
                    <img src="images/cards/4.jpg" alt="card">
                </div>
            </div>
            <div class="card_item">
                <div class="card_image">
                    <img src="images/cards/5.jpg" alt="card">
                </div>
            </div>
        </div>
        <div class="button">
            <button>Generate</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
